services:
  - type: web
    name: telegram-board-system
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: "8080"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN_2
        sync: false
      - key: TELEGRAM_BOT_TOKEN_3
        sync: false
      - key: TELEGRAM_BOT_TOKEN_4
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SUPER_ADMIN_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LOG_LEVEL
        value: "INFO"
