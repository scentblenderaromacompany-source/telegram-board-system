services:
  telegram-board:
    build: .
    container_name: telegram-board-system
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "from src.health import HealthDashboard; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
